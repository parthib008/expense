<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Personal Expense Tracker | User Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app-container">
  <aside class="sidebar">
    <div class="logo"><h2>💰 Parthib's Expenses</h2></div>
    <div class="nav-links">
      <div class="nav-item active" data-nav="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
      <div class="nav-item" data-nav="transactions"><i class="fas fa-list-ul"></i> Transactions</div>
      <div class="nav-item" data-nav="analytics"><i class="fas fa-chart-line"></i> Analytics</div>
      <div class="nav-item" id="adminPanelBtn"><i class="fas fa-user-shield"></i> Admin Panel</div>
    </div>
    <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> Dark / Light</div>
  </aside>
  <main class="main-content" id="mainContent">
    <!-- Dynamic content will load here -->
  </main>
  <!-- Add this button near the top of your dashboard, maybe next to export buttons -->
<button id="resetAllData" style="background: #ef4444; margin-left: 10px;">
  <i class="fas fa-trash-alt"></i> Reset All Data
</button>
</div>
<script src="script.js"></script>
</body>
</html>
