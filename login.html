<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-page); }
    .login-card { background: var(--card-bg); padding: 2.5rem; border-radius: 32px; width: 100%; max-width: 400px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); border: 1px solid var(--border); }
    .login-card h2 { margin-bottom: 1.5rem; text-align: center; }
    .login-card input { width: 100%; margin-bottom: 1rem; }
    .login-card button { width: 100%; }
    .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: -0.5rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
<div class="login-card">
  <h2><i class="fas fa-lock"></i> Admin Access</h2>
  <input type="text" id="adminUsername" placeholder="Username" autocomplete="off">
  <input type="password" id="adminPassword" placeholder="Password">
  <div class="error-msg" id="loginError">Invalid credentials</div>
  <button id="loginBtn">Login <i class="fas fa-arrow-right"></i></button>
  <p style="text-align:center; margin-top:1rem; font-size:0.8rem;">Demo: admin / admin123</p>
</div>
<script>
  document.getElementById("loginBtn").addEventListener("click", () => {
    const user = document.getElementById("adminUsername").value;
    const pwd = document.getElementById("adminPassword").value;
    if(user === "admin" && pwd === "admin123") {
      sessionStorage.setItem("adminAuth", "true");
      window.location.href = "admin.html";
    } else {
      document.getElementById("loginError").style.display = "block";
    }
  });
</script>
</body>
</html>
